[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
exclude = scripts/

# Exclude test files from some strict checks (MVP)
[mypy-tests.*]
disable_error_code = arg-type,attr-defined,no-untyped-def,no-untyped-call,union-attr,comparison-overlap,func-returns-value,misc,index,method-assign,var-annotated,assignment,call-arg,valid-type,import-untyped

# Disable Qt override errors (PySide6 stub issues)
[mypy-freecad.diff_wb.ui.views.diff_panel_view]
disable_error_code = override
