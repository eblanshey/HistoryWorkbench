version: '3'

vars:
  APP_NAME:
    sh: python3 -c "import tomllib; f = open('pyproject.toml', 'rb'); data = tomllib.load(f); f.close(); print(data['project']['name'].replace('-', '_'))"
  SRC: freecad/diff_wb/
  TESTS: tests/
  UV: uv

tasks:
  default:
    desc: Show available tasks
    cmds:
      - echo "Available tasks:"
      - task --list --sort none
    silent: true

  check:
    desc: Run all code quality checks
    summary: Runs ruff, mypy, docstring check, and complexity analysis
    cmds:
      - task: quality:ruff
      - task: quality:mypy
      - task: quality:docstrings
      - task: quality:complexity

  quality:fix:
    desc: Fix all auto-fixable issues
    summary: Fixes import sorting, lint issues, and formats code
    cmds:
      - "{{.UV}} run ruff check --fix {{.CLI_ARGS | default .SRC}}"
      - "{{.UV}} run ruff format {{.CLI_ARGS | default .SRC}}"

  quality:ruff:
    desc: Run ruff linting checks
    summary: Checks code style, imports, and common issues
    cmds:
      - "{{.UV}} run ruff check {{.CLI_ARGS | default .SRC}}"

  quality:mypy:
    desc: Run type checking with mypy
    summary: Validates type hints and catches type errors
    cmds:
      - "{{.UV}} run mypy {{.CLI_ARGS | default \"freecad tests\"}}"

  quality:docstrings:
    desc: Check that modules and public objects have docstrings
    summary: Runs the docstring checker on the source directory
    cmds:
      - echo "Checking docstrings..."
      - "{{.UV}} run python scripts/check_docstrs.py {{.SRC}}"

  quality:complexity:
    desc: Analyze code complexity with radon
    summary: Reports cyclomatic complexity for functions/classes with grade B or worse
    silent: true
    cmds:
      - echo "Checking complexity..."
      - |
          OUTPUT=$(uv run radon cc {{.CLI_ARGS | default .SRC}} --min C --no-assert -s 2>&1)
          if [ -z "$OUTPUT" ]; then
            echo "✅ No complexity issues found (all functions rated A or B)"
          else
            echo "$OUTPUT"
          fi

  test:
    desc: Run unit and integration tests
    cmds:
      - task: test:unit
      - task: test:integration

  test:unit:
    desc: Run tests with pytest
    summary: Executes unit tests with coverage
    cmds:
      - "{{.UV}} run pytest {{.CLI_ARGS | default \"tests/unit\"}}"

  test:coverage:
    desc: Run tests with coverage report
    summary: Executes tests and produces coverage report
    cmds:
      - "{{.UV}} run pytest --cov={{.APP_NAME}} --cov-report=term-missing {{.CLI_ARGS | default \"tests/unit\"}}"

  test:integration:
    desc: Run integration tests requiring FreeCAD runtime
    summary: Executes integration tests using FreeCAD's Python interpreter
    cmds:
      - "./run_integration_tests.sh {{.CLI_ARGS | default \"\"}}"

  translations:update:
    desc: Extract translatable strings into ProjectHistory.ts
    cmds:
      - "lupdate -extensions py freecad/diff_wb -ts freecad/diff_wb/resources/translations/ProjectHistory.ts"

  translations:update-locales:
    desc: Merge extracted strings into locale .ts files
    cmds:
      - |
          set -- freecad/diff_wb/resources/translations/ProjectHistory_*.ts
          if [ "$1" = "freecad/diff_wb/resources/translations/ProjectHistory_*.ts" ]; then
            printf '%s\n' "No locale translation files to update"
            exit 0
          fi
          lupdate -extensions py freecad/diff_wb -ts "$@"

  translations:verify-clean:
    desc: Fail if translation artifacts are stale after refresh
    cmds:
      - task: translations:refresh
      - |
          git diff --exit-code -- \
            freecad/diff_wb/resources/translations/ProjectHistory.ts \
            'freecad/diff_wb/resources/translations/ProjectHistory_*.ts' \
            'freecad/diff_wb/resources/translations/ProjectHistory_*.qm'
      - |
          untracked=$(git ls-files --others --exclude-standard -- \
            freecad/diff_wb/resources/translations/ProjectHistory.ts \
            'freecad/diff_wb/resources/translations/ProjectHistory_*.ts' \
            'freecad/diff_wb/resources/translations/ProjectHistory_*.qm')
          if [ -n "$untracked" ]; then
            printf '%s\n' "Untracked translation artifacts detected:" 
            printf '%s\n' "$untracked"
            exit 1
          fi

  translations:compile:
    desc: Compile locale translation .ts files to .qm
    cmds:
      - |
          set -- freecad/diff_wb/resources/translations/ProjectHistory_*.ts
          if [ "$1" = "freecad/diff_wb/resources/translations/ProjectHistory_*.ts" ]; then
            printf '%s\n' "No locale translation files to compile"
            exit 0
          fi
          lrelease "$@"

  translations:refresh:
    desc: Extract template, update locales, and compile translations
    cmds:
      - task: translations:update
      - task: translations:update-locales
      - task: translations:compile
